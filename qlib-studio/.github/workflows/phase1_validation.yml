name: Phase 1 Validation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate-phase1:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd qlib-studio
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
        # Install minimal dependencies for validation
        pip install pyyaml pandas numpy
    
    - name: Check file structure
      run: |
        cd qlib-studio
        echo "Checking required files..."
        test -f backend/rolling_trainer.py && echo "✓ rolling_trainer.py exists"
        test -f backend/daily_prediction.py && echo "✓ daily_prediction.py exists"
        test -f backend/task_scheduler.py && echo "✓ task_scheduler.py exists"
        test -f configs/scheduler_config.yaml && echo "✓ scheduler_config.yaml exists"
        test -f scripts/quickstart_phase1.sh && echo "✓ quickstart_phase1.sh exists"
        test -f docs/PHASE1_IMPLEMENTATION.md && echo "✓ PHASE1_IMPLEMENTATION.md exists"
    
    - name: Validate Python syntax
      run: |
        cd qlib-studio
        echo "Validating Python syntax..."
        python -m py_compile backend/rolling_trainer.py
        python -m py_compile backend/daily_prediction.py
        python -m py_compile backend/task_scheduler.py
        echo "✓ All Python files have valid syntax"
    
    - name: Test RollingTrainer import and initialization
      run: |
        cd qlib-studio
        python -c "
        import sys
        sys.path.insert(0, 'backend')
        from rolling_trainer import RollingTrainer
        import tempfile
        
        with tempfile.TemporaryDirectory() as tmpdir:
            trainer = RollingTrainer(
                experiment_dir=tmpdir,
                window_size=60,
                step_size=20,
                mode='rolling'
            )
            print('✓ RollingTrainer initialized successfully')
            
            periods = trainer.generate_periods(
                calendar_start='2020-01-01',
                calendar_end='2021-12-31',
                min_train_days=30
            )
            print(f'✓ Generated {len(periods)} training periods')
            assert len(periods) > 0
        "
    
    - name: Test DailyPredictor import
      run: |
        cd qlib-studio
        python -c "
        import sys
        sys.path.insert(0, 'backend')
        from daily_prediction import DailyPredictor
        import tempfile
        
        with tempfile.TemporaryDirectory() as tmpdir:
            predictor = DailyPredictor(
                model_dir=tmpdir,
                output_dir=tmpdir,
                data_source='mock'
            )
            print('✓ DailyPredictor initialized successfully')
        "
    
    - name: Test TaskScheduler import
      run: |
        cd qlib-studio
        python -c "
        import sys
        sys.path.insert(0, 'backend')
        from task_scheduler import TaskScheduler
        
        scheduler = TaskScheduler(config_path=None)
        print('✓ TaskScheduler initialized successfully')
        
        tasks = scheduler.list_tasks()
        print(f'✓ Found {len(tasks)} predefined tasks')
        assert len(tasks) >= 3
        "
    
    - name: Validate YAML configurations
      run: |
        cd qlib-studio
        python -c "
        import yaml
        with open('configs/scheduler_config.yaml', 'r') as f:
            config = yaml.safe_load(f)
            print('✓ scheduler_config.yaml is valid YAML')
            assert 'tasks' in config
            print(f'✓ Found {len(config[\"tasks\"])} task definitions')
        "
    
    - name: Run minimal end-to-end mock test
      run: |
        cd qlib-studio
        python -c "
        import sys, tempfile
        sys.path.insert(0, 'backend')
        from rolling_trainer import RollingTrainer
        
        with tempfile.TemporaryDirectory() as tmpdir:
            trainer = RollingTrainer(experiment_dir=tmpdir, window_size=30, step_size=10, mode='rolling')
            trainer.generate_periods(calendar_start='2020-01-01', calendar_end='2020-06-30', min_train_days=20)
            results = trainer.train_all()
            print(f'✓ Trained {len(results)} models in mock mode')
            assert len(results) > 0
        "
    
    - name: Summary
      run: |
        echo "## Phase 1 Validation Complete" >> $GITHUB_STEP_SUMMARY
        echo "✅ All checks passed for Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
